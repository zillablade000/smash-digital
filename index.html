<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Platformer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #222; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Constants
        const GRAVITY = 0.5;
        const JUMP_FORCE = 12;
        const MOVE_SPEED = 5;

        // Canvas Setup
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Ground
        const ground = {
            x: 0,
            y: canvas.height * 0.75,
            width: canvas.width,
            height: 100
        };

        // Player
        const player = {
            x: canvas.width / 2,
            y: ground.y - 50,
            width: 40,
            height: 50,
            vx: 0,
            vy: 0,
            color: '#FF6B6B'
        };

        // Input
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Update Function
        function update() {
            // Apply Gravity
            player.vy += GRAVITY;

            // Movement Input
            if (keys['a']) player.vx = -MOVE_SPEED;
            else if (keys['d']) player.vx = MOVE_SPEED;
            else player.vx = 0;

            // Jumping
            if (keys['w'] && player.y >= ground.y - player.height) {
                player.vy = -JUMP_FORCE;
            }

            // Update Position
            player.x += player.vx;
            player.y += player.vy;

            // Ground Collision
            if (player.y + player.height >= ground.y) {
                player.y = ground.y - player.height;
                player.vy = 0;
            }

            // Boundaries
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
        }

        // Draw Function
        function draw() {
            // Clear Canvas
            ctx.fillStyle = 'rgba(255,255,255,0.02)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(ground.x, ground.y, ground.width, ground.height);

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        // Game Loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
