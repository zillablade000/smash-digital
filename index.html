<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIGHTER — Smash-Style Arena</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230d0d1e'/><text x='4' y='26' font-size='24'>🥊</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050510;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    #gameCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: default;
      /* Subtle outer glow */
      box-shadow:
        0 0 0 2px #1a1a3a,
        0 0 40px rgba(64, 96, 224, 0.3),
        0 0 80px rgba(64, 96, 224, 0.1);
    }

    /* Loading overlay shown until JS starts */
    #loadOverlay {
      position: fixed;
      inset: 0;
      background: #050510;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.4s;
    }
    #loadOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loadOverlay h1 {
      color: #4060E0;
      font-size: 2.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(64,96,224,0.8);
    }
    #loadOverlay p {
      color: rgba(255,255,255,0.4);
      margin-top: 1rem;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }
    .loader {
      margin-top: 2rem;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(64,96,224,0.2);
      border-top-color: #4060E0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loadOverlay">
    <h1>FIGHTER</h1>
    <p>LOADING ASSETS...</p>
    <div class="loader"></div>
  </div>

  <!-- Game canvas -->
  <canvas id="gameCanvas"></canvas>

  <script type="module">
    import './js/main.js';
    // Hide load overlay once module is parsed
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loadOverlay').classList.add('hidden');
      }, 300);
    });
  </script>
</body>
</html>
