<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smash Digital</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { 
            background: #222; 
            font-family: Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        
        canvas { 
            display: block; 
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            touch-action: none;
        }
        
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }
        
        .player-info {
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .damage { font-size: 32px; color: #FFD700; }
        
        .button-grid {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: all;
            gap: 20px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .dpad {
            display: grid;
            grid-template-columns: 40px 40px 40px;
            gap: 5px;
            width: 130px;
        }
        
        .btn {
            width: 60px;
            height: 60px;
            border: 3px solid white;
            border-radius: 10px;
            background: rgba(50,50,50,0.8);
            color: white;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .btn:active { 
            background: rgba(150,150,150,0.9);
            transform: scale(0.95);
        }
        
        .dpad-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #FF6B6B;
            border-radius: 5px;
            background: rgba(50,50,50,0.8);
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .dpad-btn:active {
            background: rgba(150,100,100,0.9);
        }
        
        .spacer { visibility: hidden; }
        
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            pointer-events: all;
        }
        
        .start-content {
            text-align: center;
            color: white;
            background: rgba(50,50,50,0.9);
            padding: 40px;
            border-radius: 15px;
            border: 3px solid #4ECDC4;
        }
        
        .start-content h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #4ECDC4;
        }
        
        .start-content p {
            font-size: 16px;
            margin: 10px 0;
            line-height: 1.5;
        }
        
        #startBtn {
            margin-top: 30px;
            padding: 20px 50px;
            font-size: 20px;
            background: #4ECDC4;
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: all;
        }
        
        #startBtn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="hud">
            <div class="player-info">
                <div>P1</div>
                <div class="damage" id="p1dmg">0%</div>
                <div id="p1st">❤️❤️❤️</div>
            </div>
            <div class="player-info">
                <div>P2</div>
                <div class="damage" id="p2dmg">0%</div>
                <div id="p2st">❤️❤️❤️</div>
            </div>
        </div>
        
        <div class="button-grid">
            <div class="control-group">
                <div class="dpad">
                    <div class="spacer"></div>
                    <button class="dpad-btn" id="up">↑</button>
                    <div class="spacer"></div>
                    <button class="dpad-btn" id="left">←</button>
                    <div class="spacer"></div>
                    <button class="dpad-btn" id="right">→</button>
                    <div class="spacer"></div>
                    <button class="dpad-btn" id="down">↓</button>
                    <div class="spacer"></div>
                </div>
                <button class="btn" id="jumpBtn" style="border-color: #4ECDC4;">JUMP</button>
            </div>
            
            <div class="control-group">
                <button class="btn" id="atkBtn" style="border-color: #FFD700;">ATK</button>
                <button class="btn" id="shieldBtn" style="border-color: #87CEEB;">SHIELD</button>
            </div>
        </div>
    </div>
    
    <div id="startScreen">
        <div class="start-content">
            <h1>⚔️ SMASH DIGITAL ⚔️</h1>
            <p><strong>Player 1 (Left):</strong> D-Pad + Jump</p>
            <p><strong>Player 2 (Right):</strong> Attack + Shield</p>
            <p>Last player standing wins!</p>
            <button id="startBtn">🎮 TAP TO START 🎮</button>
        </div>
    </div>

    <script>
        // ============ CONSTANTS ============
        const GRAVITY = 0.6;
        const GROUND_FRICTION = 0.85;
        const AIR_FRICTION = 0.96;
        const KB_DAMPEN = 0.98;
        
        const STATES = {
            IDLE: 'idle',
            RUNNING: 'running',
            JUMP: 'jump',
            FALL: 'fall',
            ATK: 'atk',
            HIT: 'hit',
            SHIELD: 'shield'
        };

        // ============ CANVAS ============
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ============ STAGE ============
        let groundY = 0;
        function updateGroundY() {
            groundY = canvas.height * 0.75;
        }
        updateGroundY();

        // ============ PLAYER CLASS ============
        class Player {
            constructor(x, playerNum) {
                this.num = playerNum;
                this.x = x;
                this.y = groundY - 60;
                this.w = 40;
                this.h = 50;
                this.vx = 0;
                this.vy = 0;
                this.dmg = 0;
                this.stocks = 3;
                this.state = STATES.IDLE;
                this.facing = playerNum === 1 ? 1 : -1;
                this.grounded = false;
                this.stateTimer = 0;
                this.shield = 100;
                this.shielding = false;
                this.kb = { x: 0, y: 0 };
                this.hitboxes = [];
                this.color = playerNum === 1 ? '#FF6B6B' : '#4ECDC4';
            }

            attack(isSmash) {
                this.state = STATES.ATK;
                this.stateTimer = 8;
                
                const dmg = isSmash ? 12 : 5;
                const kb = isSmash ? 10 : 4;
                const dmgMult = 1 + this.dmg / 100;
                
                this.hitboxes.push({
                    x: this.x + this.facing * 40,
                    y: this.y,
                    r: 25,
                    dmg: dmg * dmgMult,
                    kb: kb * dmgMult,
                    angle: 45,
                    life: 12
                });
            }

            updatePhysics() {
                if (!this.grounded) {
                    this.vy += GRAVITY;
                    this.vy = Math.min(this.vy, 15);
                }

                this.vx += this.kb.x;
                this.vy += this.kb.y;
                this.kb.x *= KB_DAMPEN;
                this.kb.y *= KB_DAMPEN;

                if (this.grounded) {
                    this.vx *= GROUND_FRICTION;
                } else {
                    this.vx *= AIR_FRICTION;
                }

                this.x += this.vx;
                this.y += this.vy;
                this.grounded = false;

                // Ground collision
                if (this.y + this.h/2 >= groundY) {
                    this.y = groundY - this.h/2;
                    this.vy = 0;
                    this.grounded = true;
                }

                // Blast zones
                if (this.x < -200 || this.x > canvas.width + 200 || this.y > canvas.height + 200) {
                    this.stocks--;
                    this.respawn();
                }
            }

            updateState() {
                if (this.stateTimer > 0) this.stateTimer--;

                if (this.state === STATES.ATK && this.stateTimer === 0) {
                    this.state = this.grounded ? STATES.IDLE : STATES.FALL;
                }
                if (this.state === STATES.HIT && this.stateTimer === 0) {
                    this.state = this.grounded ? STATES.IDLE : STATES.FALL;
                }
                if (this.state === STATES.JUMP && this.vy > 0) {
                    this.state = STATES.FALL;
                }
                if (this.state === STATES.RUNNING && !this.inputLeft && !this.inputRight) {
                    this.state = STATES.IDLE;
                    this.vx = 0;
                }
                if (this.state === STATES.SHIELD && !this.shielding) {
                    this.state = STATES.IDLE;
                }
            }

            updateHitboxes(other) {
                for (let i = this.hitboxes.length - 1; i >= 0; i--) {
                    const hb = this.hitboxes[i];
                    const dx = hb.x - other.x;
                    const dy = hb.y - other.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist < hb.r + 25) {
                        if (other.shielding) {
                            other.shield -= hb.dmg * 3;
                            if (other.shield <= 0) {
                                other.state = STATES.SHIELD;
                                other.stateTimer = 20;
                                other.shielding = false;
                            }
                        } else {
                            other.dmg = Math.min(other.dmg + hb.dmg, 999);
                            const ang = (hb.angle * Math.PI) / 180;
                            other.kb.x = Math.cos(ang) * hb.kb;
                            other.kb.y = Math.sin(ang) * hb.kb;
                            other.state = STATES.HIT;
                            other.stateTimer = Math.ceil(hb.kb / 2);
                        }
                        this.hitboxes.splice(i, 1);
                    } else {
                        hb.life--;
                        if (hb.life <= 0) this.hitboxes.splice(i, 1);
                    }
                }
            }

            respawn() {
                this.x = this.num === 1 ? canvas.width * 0.25 : canvas.width * 0.75;
                this.y = groundY - 100;
                this.vx = 0;
                this.vy = 0;
                this.kb = { x: 0, y: 0 };
                this.state = STATES.IDLE;
                this.dmg = 0;
                this.shield = 100;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.w/2, this.y - this.h/2, this.w, this.h);

                if (this.shielding) {
                    ctx.strokeStyle = 'rgba(100,200,255,0.5)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 50, 0, Math.PI * 2);
                    ctx.stroke();
                }

                for (let hb of this.hitboxes) {
                    ctx.strokeStyle = 'red';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(hb.x, hb.y, hb.r, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            update() {
                this.updatePhysics();
                this.updateState();
                this.draw();
            }
        }

        // ============ GAME STATE ============
        let p1, p2;
        let gameRunning = false;

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            updateGroundY();
            p1 = new Player(canvas.width * 0.25, 1);
            p2 = new Player(canvas.width * 0.75, 2);
            gameRunning = true;
            gameLoop();
        }

        // ============ INPUT HANDLING ============
        let inputState = {
            p1: { left: false, right: false, up: false, down: false, jump: false, atk: false, shield: false },
            p2: { left: false, right: false, up: false, down: false, jump: false, atk: false, shield: false }
        };

        function attachButtonListeners() {
            document.getElementById('left').addEventListener('touchstart', () => { inputState.p1.left = true; });
            document.getElementById('left').addEventListener('touchend', () => { inputState.p1.left = false; });
            document.getElementById('right').addEventListener('touchstart', () => { inputState.p1.right = true; });
            document.getElementById('right').addEventListener('touchend', () => { inputState.p1.right = false; });
            document.getElementById('up').addEventListener('touchstart', () => { inputState.p1.up = true; });
            document.getElementById('up').addEventListener('touchend', () => { inputState.p1.up = false; });
            document.getElementById('down').addEventListener('touchstart', () => { inputState.p1.down = true; });
            document.getElementById('down').addEventListener('touchend', () => { inputState.p1.down = false; });
            document.getElementById('jumpBtn').addEventListener('touchstart', () => { inputState.p1.jump = true; });
            document.getElementById('jumpBtn').addEventListener('touchend', () => { inputState.p1.jump = false; });
            
            document.getElementById('atkBtn').addEventListener('touchstart', () => { inputState.p2.atk = true; });
            document.getElementById('atkBtn').addEventListener('touchend', () => { inputState.p2.atk = false; });
            document.getElementById('shieldBtn').addEventListener('touchstart', () => { inputState.p2.shield = true; });
            document.getElementById('shieldBtn').addEventListener('touchend', () => { inputState.p2.shield = false; });
            
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('startBtn').addEventListener('touchstart', startGame);
        }

        // ============ GAME LOOP ============
        function gameLoop() {
            if (!gameRunning) return;

            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw ground
            ctx.fillStyle = 'rgba(139,69,19,0.8)';
            ctx.fillRect(0, groundY, canvas.width, 30);

            // Handle input
            if (inputState.p1.left) {
                p1.facing = -1;
                if (p1.grounded && p1.state === STATES.IDLE) {
                    p1.state = STATES.RUNNING;
                    p1.vx = -5;
                }
            }
            if (inputState.p1.right) {
                p1.facing = 1;
                if (p1.grounded && p1.state === STATES.IDLE) {
                    p1.state = STATES.RUNNING;
                    p1.vx = 5;
                }
            }
            if (inputState.p1.jump && p1.grounded && p1.state === STATES.IDLE) {
                p1.state = STATES.JUMP;
                p1.vy = -12;
                p1.grounded = false;
                inputState.p1.jump = false;
            }

            if (inputState.p2.shield && p2.grounded && p2.state === STATES.IDLE) {
                p2.state = STATES.SHIELD;
                p2.shielding = true;
            } else if (!inputState.p2.shield) {
                p2.shielding = false;
            }

            if (inputState.p2.atk && (p2.state === STATES.IDLE || p2.state === STATES.RUNNING)) {
                p2.attack(false);
                inputState.p2.atk = false;
            }

            // Update
            p1.update();
            p2.update();
            p1.updateHitboxes(p2);
            p2.updateHitboxes(p1);

            // Update HUD
            const stocks1 = '❤️'.repeat(Math.max(0, p1.stocks));
            const stocks2 = '❤️'.repeat(Math.max(0, p2.stocks));
            document.getElementById('p1dmg').textContent = Math.floor(p1.dmg) + '%';
            document.getElementById('p2dmg').textContent = Math.floor(p2.dmg) + '%';
            document.getElementById('p1st').textContent = stocks1;
            document.getElementById('p2st').textContent = stocks2;

            // Check win condition
            if (p1.stocks <= 0 || p2.stocks <= 0) {
                gameRunning = false;
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(p1.stocks > 0 ? 'PLAYER 1 WINS!' : 'PLAYER 2 WINS!', canvas.width/2, canvas.height/2);
                ctx.font = '20px Arial';
                ctx.fillText('Refresh to play again', canvas.width/2, canvas.height/2 + 50);
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        // ============ INITIALIZATION ============
        attachButtonListeners();
    </script>
</body>
</html>
